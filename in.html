<script>
    // Твой ключ OpenRouter
    const API_KEY = "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";

    async function ask() {
        const input = document.getElementById('user-in');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', "**Вы:** " + text);
        input.value = '';
        const loading = addMessage('ai', "Moon AI пробивается через защиту...");

        try {
            // МЫ ДОБАВИЛИ ПРОКСИ ПЕРЕД ОСНОВНЫМ URL
            const response = await fetch("https://corsproxy.io/?https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "google/gemma-2-9b-it:free",
                    "messages": [
                        {"role": "system", "content": "Ты Moon AI. Отвечай на русском."},
                        {"role": "user", "content": text}
                    ]
                })
            });

            const data = await response.json();
            loading.remove();
            
            if (data.choices && data.choices[0]) {
                addMessage('ai', data.choices[0].message.content);
            } else {
                addMessage('ai', "Ошибка: Нейросеть прислала пустой ответ. Проверь баланс на сайте OpenRouter.");
            }
        } catch (err) {
            loading.innerText = "❌ Даже прокси не помог. Скорее всего, блокирует антивирус или провайдер.";
            console.error(err);
        }
    }

    function addMessage(type, txt) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerHTML = marked.parse(txt);
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        return div;
    }

    document.getElementById('send-btn').onclick = ask;
    document.getElementById('user-in').onkeydown = (e) => { if(e.key === 'Enter') ask(); };
</script>
