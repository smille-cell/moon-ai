<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #121212; --side: #181818; --text: #ffffff; --accent: #00aaff;
            --msg-ai: #1e1e1e; --msg-user: #2a2a2a; --radius: 20px;
        }
        body.light {
            --bg: #f5f5f5; --side: #ffffff; --text: #1a1a1a; --accent: #0077ff;
            --msg-ai: #ebebeb; --msg-user: #ffffff;
        }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; overflow: hidden; }
        .sidebar { width: 280px; background: var(--side); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid rgba(128,128,128,0.1); }
        .nav-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 14px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; border-radius: 14px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; background: rgba(128,128,128,0.05); }
        .chat-item.active { border: 1px solid var(--accent); background: rgba(0, 170, 255, 0.1); }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 15% 120px 15%; scroll-behavior: smooth; display: flex; flex-direction: column; }
        .msg { margin-bottom: 20px; padding: 15px 20px; border-radius: var(--radius); max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .user { background: var(--msg-user); align-self: flex-end; border: 1px solid rgba(128,128,128,0.1); }
        .ai { background: var(--msg-ai); align-self: flex-start; border: 1px solid rgba(128,128,128,0.1); }
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; background: linear-gradient(transparent, var(--bg) 40%); }
        .input-wrap { max-width: 800px; margin: 0 auto; background: var(--side); border-radius: 25px; padding: 10px 20px; display: flex; border: 1px solid rgba(128,128,128,0.2); }
        input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin-bottom: 20px;">Moon AI 🌕</h2>
    <button class="nav-btn" onclick="createNewChat()">+ Новый чат</button>
    <div class="chat-list" id="chat-list"></div>
    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
        <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:20px;">🌓</button>
        <button onclick="resetKey()" style="background:none; border:none; color:var(--text); opacity:0.5; cursor:pointer; font-size:12px;">Сменить ключ</button>
    </div>
</div>

<div class="main">
    <div id="chat-window"></div>
    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="user-in" placeholder="Спроси Moon AI..." autocomplete="off">
            <button onclick="sendMessage()" style="background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer;">▲</button>
        </div>
    </div>
</div>

<script>
    // --- ПРОВЕРКА КЛЮЧА ---
    let API_KEY = localStorage.getItem('moon_api_key');

    if (!API_KEY) {
        API_KEY = prompt("Введите ваш новый API Key от OpenRouter:");
        if (API_KEY) localStorage.setItem('moon_api_key', API_KEY);
    }

    let chats = JSON.parse(localStorage.getItem('moon_chats')) || [];
    let currentChatId = localStorage.getItem('moon_current_id') || null;
    let isLight = localStorage.getItem('moon_theme') === 'light';

    if (isLight) document.body.classList.add('light');

    function init() {
        renderChatList();
        if (currentChatId) loadChat(currentChatId);
        else if (chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
    }

    function createNewChat() {
        const id = Date.now().toString();
        chats.unshift({ id, title: "Новый чат", messages: [] });
        save(); loadChat(id); renderChatList();
    }

    function loadChat(id) {
        currentChatId = id;
        localStorage.setItem('moon_current_id', id);
        const chat = chats.find(c => c.id === id);
        document.getElementById('chat-window').innerHTML = '';
        chat.messages.forEach(m => addMessageToUI(m.role, m.content, false));
        renderChatList();
    }

    async function sendMessage() {
        const input = document.getElementById('user-in');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        const chat = chats.find(c => c.id === currentChatId);
        if (chat.messages.length === 0) chat.title = text.substring(0, 20);

        chat.messages.push({ role: 'user', content: text });
        addMessageToUI('user', text);
        input.value = '';
        save();

        const loadDiv = addMessageToUI('ai', "Moon AI думает...");
        
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": "google/gemma-2-9b-it:free", "messages": chat.messages })
            });
            const data = await res.json();
            loadDiv.remove();
            const aiText = data.choices[0].message.content;
            chat.messages.push({ role: 'assistant', content: aiText });
            addMessageToUI('ai', aiText);
            save();
        } catch (e) { loadDiv.innerText = "Ошибка. Проверь ключ."; }
    }

    function addMessageToUI(role, content, scroll = true) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
        div.innerHTML = marked.parse(content);
        document.getElementById('chat-window').appendChild(div);
        if (scroll) document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return div;
    }

    function renderChatList() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `<span>${chat.title}</span><button onclick="event.stopPropagation(); deleteChat('${chat.id}')" style="background:none; border:none; color:red; cursor:pointer;">×</button>`;
            div.onclick = () => loadChat(chat.id);
            list.appendChild(div);
        });
    }

    function save() { localStorage.setItem('moon_chats', JSON.stringify(chats)); }
    function toggleTheme() { isLight = !isLight; document.body.classList.toggle('light'); localStorage.setItem('moon_theme', isLight ? 'light' : 'dark'); }
    function resetKey() { localStorage.removeItem('moon_api_key'); location.reload(); }
    function deleteChat(id) { chats = chats.filter(c => c.id !== id); save(); init(); }

    document.getElementById('user-in').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };
    init();
</script>

</body>
</html>
