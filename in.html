<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Moon AI PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --side: #111; --text: #e0e0e0; --accent: #00aaff; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: sans-serif; }
        .sidebar { width: 240px; background: var(--side); padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 15% 120px 15%; }
        .msg { margin-bottom: 25px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .user { background: #2c2c2c; }
        .ai { border-left: 4px solid var(--accent); background: rgba(0, 170, 255, 0.05); }
        .input-area { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; }
        .input-wrap { width: 80%; background: #252525; border-radius: 15px; padding: 10px; display: flex; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; }
        button { background: var(--accent); border: none; color: white; padding: 5px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar"><h2>Moon AI</h2></div>
    <div class="main">
        <div id="chat"><div class="msg ai">С возвращением! Ссылка настроена, CORS не мешает. Я готов к работе!</div></div>
        <div class="input-area"><div class="input-wrap">
            <input type="text" id="user-in" placeholder="Спроси что-нибудь...">
            <button id="btn">▲</button>
        </div></div>
    </div>
    <script>
        // ВСТАВЬ НОВЫЙ КЛЮЧ ТУТ:
        const API_KEY = "ТВОЙ_НОВЫЙ_КЛЮЧ";

        async function ask() {
            const input = document.getElementById('user-in');
            const text = input.value.trim();
            if(!text) return;
            addMsg('user', "**Вы:** " + text);
            input.value = '';
            const load = addMsg('ai', "Moon AI думает...");
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": "google/gemma-2-9b-it:free",
                        "messages": [{"role": "user", "content": text}]
                    })
                });
                const data = await res.json();
                load.remove();
                addMsg('ai', data.choices[0].message.content);
            } catch (e) { load.innerText = "Ошибка. Проверь ключ."; }
        }
        function addMsg(cls, txt) {
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.innerHTML = marked.parse(txt);
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return div;
        }
        document.getElementById('btn').onclick = ask;
        document.getElementById('user-in').onkeydown = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
