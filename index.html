<script type="module">
    let API_KEY = localStorage.getItem('gemini_token');
    
    // МЫ МЕНЯЕМ ПУТЬ НА v1beta, НО С ПРАВИЛЬНЫМ НАЗВАНИЕМ МОДЕЛИ
    // Это самый актуальный адрес на апрель 2026 года
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    if (API_KEY) {
        document.getElementById('key-modal').style.display = 'none';
        document.getElementById('status').innerText = "ONLINE | SYSTEM READY";
    }

    window.saveKey = function() {
        const val = document.getElementById('key-input').value.trim();
        if (val.startsWith('AIza')) {
            localStorage.setItem('gemini_token', val);
            location.reload();
        } else {
            alert("Ошибка: Ключ должен начинаться с AIza");
        }
    }

    window.changeKey = function() {
        localStorage.removeItem('gemini_token');
        location.reload();
    }

    window.askGemini = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        addBubble('user', text);
        input.value = '';
        const loader = addBubble('ai', '<i>Луна настраивает связь...</i>');

        try {
            // ФОРМИРУЕМ ЗАПРОС
            const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            if (loader) loader.remove();

            if (data.candidates && data.candidates[0]) {
                const aiText = data.candidates[0].content.parts[0].text;
                addBubble('ai', aiText);
            } else if (data.error) {
                // Если снова будет ошибка про модель, выведем её текст
                addBubble('ai', "<b>Системное сообщение:</b> " + data.error.message);
                console.error("DEBUG:", data.error);
            }
        } catch (e) {
            if (loader) loader.remove();
            addBubble('ai', "<b>Ошибка сети.</b> Убедись, что VPN (Hiddify) включен и работает.");
            console.error("FETCH ERROR:", e);
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else {
            d.innerHTML = text;
        }
        
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') askGemini(); };
</script>
