<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI | Gemini OS</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #050508; --accent: #00f2ff; --panel: #0d0d12; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #key-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0,242,255,0.1); }

        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .status-info { font-size: 11px; opacity: 0.5; margin-top: 10px; text-transform: uppercase; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.5; font-size: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { background: #1e1e2e; align-self: flex-end; color: var(--accent); border: 1px solid #333; border-bottom-right-radius: 4px; }
        .ai { background: #11111b; align-self: flex-start; border: 1px solid #222; border-bottom-left-radius: 4px; }
        
        .input-area { padding: 25px 10%; display: flex; gap: 10px; background: var(--bg); }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 14px; border-radius: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; color: #000; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        
        pre { background: #000 !important; padding: 15px; border-radius: 12px; border: 1px solid #222; overflow-x: auto; margin: 10px 0; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

<div id="key-modal">
    <div class="modal-content">
        <h2 style="color:var(--accent); margin:0;">MOON AI SYSTEM</h2>
        <p style="opacity:0.6; font-size:13px; margin-bottom: 20px;">Введите API ключ (AIza...)</p>
        <input type="password" id="key-input" style="width:100%; margin-bottom: 20px; box-sizing: border-box;" placeholder="Вставь ключ сюда">
        <button onclick="saveKey()" style="width: 100%; height: 45px;">ЗАПУСТИТЬ ЛУНУ</button>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">MOON AI 🌕</div>
    <div id="status" class="status-info">ОЖИДАНИЕ...</div>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top: auto; background: transparent; color: #444; border: 1px solid #222; padding: 8px; cursor: pointer; border-radius: 8px; font-size: 10px;">Сбросить систему</button>
</aside>

<main class="main">
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Напиши Луне..." autocomplete="off">
        <button onclick="askGemini()">ОТПРАВИТЬ</button>
    </div>
</main>

<script type="module">
    let API_KEY = localStorage.getItem('gemini_token');
    
    // Используем v1beta и модель gemini-1.5-flash (самая стабильная связка сейчас)
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    if (API_KEY) {
        document.getElementById('key-modal').style.display = 'none';
        document.getElementById('status').innerText = "ONLINE | READY";
    }

    window.saveKey = function() {
        const val = document.getElementById('key-input').value.trim();
        if (val.startsWith('AIza')) {
            localStorage.setItem('gemini_token', val);
            location.reload();
        } else { alert("Неверный формат ключа!"); }
    }

    window.askGemini = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        addBubble('user', text);
        input.value = '';
        const loader = addBubble('ai', '<i>Луна принимает сигнал...</i>');

        try {
            const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            loader.remove();

            if (data.candidates && data.candidates[0]) {
                const aiText = data.candidates[0].content.parts[0].text;
                addBubble('ai', aiText);
            } else if (data.error) {
                addBubble('ai', "<b>Ошибка:</b> " + data.error.message);
                console.error("DEBUG:", data.error);
            }
        } catch (e) {
            if (loader) loader.remove();
            addBubble('ai', "<b>Связь прервана.</b> Проверь, включен ли VPN (Hiddify).");
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else { d.innerHTML = text; }
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') askGemini(); };
</script>
</body>
</html>
