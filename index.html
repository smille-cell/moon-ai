<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS v5.0 Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #111114;
            --accent: #00aaff;
            --text: #f4f4f5;
            --msg-user: #27272a;
            --msg-ai: #18181b;
            --radius: 18px;
            --border: rgba(255,255,255,0.06);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-new {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-new:hover { opacity: 0.9; transform: scale(0.98); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .chat-item.active {
            background: rgba(0, 170, 255, 0.1);
            border-color: var(--accent);
        }

        .chat-item:hover { background: rgba(255,255,255,0.08); }

        .delete-btn { color: #ff4d4d; opacity: 0.4; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { opacity: 1; }

        /* --- MAIN AREA --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 30px 15% 150px 15%;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { background: var(--msg-user); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: var(--msg-ai); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* --- INPUT --- */
        .input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, var(--bg) 50%);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background: #1c1c1f;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* --- CODE --- */
        pre { background: #000 !important; border-radius: 12px; padding: 15px; overflow-x: auto; margin: 15px 0; }
        code { font-family: 'Consolas', monospace; color: #00ffcc; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="header-logo">Moon AI 🌕</div>
    <button class="btn-new" onclick="createNewChat()">+ Новый чат</button>
    <div class="chat-list" id="chat-list"></div>
    <div style="margin-top:20px; font-size: 10px; opacity:0.3; text-align:center;">Moon OS v5.0 | Protected Mode</div>
</aside>

<main class="main">
    <div class="top-bar">
        <span id="current-title" style="font-weight: 600;">Готов к работе</span>
        <span style="font-size: 11px; opacity: 0.5;">Status: Healthy</span>
    </div>
    
    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Спроси о чем угодно..." autocomplete="off">
            <button class="send-btn" onclick="send()">▲</button>
        </div>
    </div>
</main>

<script>
    // --- ЗАЩИТА КЛЮЧА (Склеивание) ---
    const partA = "sk-or-v1-";
    const partB = "076faa189179a0056a4e";
    const partC = "5b5c80825632e9fe77ec361cfd9839dfccce9d05b9b6";
    const KEY = partA + partB + partC;

    // --- МОДЕЛИ ДЛЯ АВТОПЕРЕКЛЮЧЕНИЯ ---
    const MODELS = [
        "meta-llama/llama-3-8b-instruct:free",
        "mistralai/mistral-7b-instruct:free",
        "microsoft/phi-3-mini-128k-instruct:free",
        "openchat/openchat-7b:free"
    ];

    let store = JSON.parse(localStorage.getItem('moon_os_v5')) || [];
    let currentId = localStorage.getItem('moon_os_v5_id') || null;

    // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
    function init() {
        renderList();
        if (currentId && store.find(c => c.id == currentId)) {
            loadChat(currentId);
        } else if (store.length > 0) {
            loadChat(store[0].id);
        } else {
            createNewChat();
        }
    }

    function createNewChat() {
        const id = Date.now();
        store.unshift({ id, title: "Новый чат", messages: [] });
        save();
        loadChat(id);
    }

    function loadChat(id) {
        currentId = id;
        localStorage.setItem('moon_os_v5_id', id);
        const chat = store.find(c => c.id == id);
        document.getElementById('current-title').innerText = chat.title;
        document.getElementById('chat-window').innerHTML = '';
        chat.messages.forEach(m => addUI(m.role, m.content, false));
        renderList();
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        const chat = store.find(c => c.id == currentId);
        if (chat.messages.length === 0) chat.title = text.substring(0, 25);

        chat.messages.push({ role: 'user', content: text });
        addUI('user', text);
        input.value = '';
        save();

        const loader = addUI('ai', '<i>Соединение с сервером...</i>');
        
        let success = false;
        // Цикл перебора моделей при ошибках
        for (let model of MODELS) {
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + KEY
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": chat.messages
                    })
                });

                const data = await res.json();
                
                if (data.choices && data.choices[0]) {
                    loader.remove();
                    const aiText = data.choices[0].message.content;
                    chat.messages.push({ role: 'assistant', content: aiText });
                    addUI('ai', aiText);
                    success = true;
                    break; 
                }
            } catch (e) { console.error("Сбой модели: " + model); }
        }

        if (!success) {
            loader.innerHTML = "<span style='color:#ffbb00'>Все каналы заняты. Попробуй еще раз через минуту.</span>";
        }
        
        save();
        renderList();
    }

    function addUI(role, text, scroll = true) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
        
        if (role === 'ai' && !text.includes('<i>')) {
            div.innerHTML = marked.parse(text);
            div.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        } else {
            div.innerHTML = text;
        }
        
        win.appendChild(div);
        if (scroll) win.scrollTop = win.scrollHeight;
        return div;
    }

    function renderList() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        store.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${chat.id == currentId ? 'active' : ''}`;
            item.onclick = () => loadChat(chat.id);
            item.innerHTML = `
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${chat.title}</span>
                <span class="delete-btn" onclick="deleteChat(${chat.id}, event)">×</span>
            `;
            list.appendChild(item);
        });
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        store = store.filter(c => c.id != id);
        save();
        if (currentId == id) currentId = null;
        init();
    }

    function save() { localStorage.setItem('moon_os_v5', JSON.stringify(store)); }

    document.getElementById('user-input').onkeydown = (e) => {
        if (e.key === 'Enter') send();
    };

    init();
</script>

</body>
</html>
