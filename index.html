<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI | Stable Build</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #050508; --accent: #00f2ff; --panel: #0d0d12; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #key-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; }

        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.5; font-size: 15px; }
        .user { background: #1e1e2e; align-self: flex-end; color: var(--accent); border: 1px solid #333; }
        .ai { background: #11111b; align-self: flex-start; border: 1px solid #222; }
        
        .input-area { padding: 25px 10%; display: flex; gap: 10px; background: var(--bg); }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 12px; outline: none; }
        button { background: var(--accent); border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        pre { background: #000 !important; padding: 12px; border-radius: 10px; overflow-x: auto; border: 1px solid #222; }
    </style>
</head>
<body>

<div id="key-modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">Moon AI OS</h2>
        <input type="password" id="key-input" style="width:100%; margin: 15px 0; box-sizing: border-box;" placeholder="AIzaSy...">
        <button onclick="saveKey()" style="width: 100%; height: 45px;">АКТИВИРОВАТЬ</button>
    </div>
</div>

<aside class="sidebar">
    <h2 style="color:var(--accent)">MOON AI</h2>
    <div id="status" style="font-size: 12px; opacity: 0.5;">OFFLINE</div>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top: auto; background: #222; color: #777; border: none; padding: 5px; cursor: pointer;">Сброс</button>
</aside>

<main class="main">
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Напиши что-нибудь..." autocomplete="off">
        <button onclick="askGemini()">ОТПРАВИТЬ</button>
    </div>
</main>

<script type="module">
    let API_KEY = localStorage.getItem('gemini_token');
    // Используем v1beta — это самая стабильная версия сейчас
    const URL_BASE = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    if (API_KEY) {
        document.getElementById('key-modal').style.display = 'none';
        document.getElementById('status').innerText = "ONLINE | READY";
    }

    window.saveKey = function() {
        const val = document.getElementById('key-input').value.trim();
        if (val.startsWith('AIza')) {
            localStorage.setItem('gemini_token', val);
            location.reload();
        } else {
            alert("Неверный ключ!");
        }
    }

    window.askGemini = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        // 1. Показываем сообщение пользователя
        addBubble('user', text);
        input.value = '';

        // 2. Показываем лоадер
        const loader = addBubble('ai', '<i>Луна обрабатывает...</i>');

        try {
            const response = await fetch(`${URL_BASE}?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            // Убираем лоадер ТОЛЬКО когда получили ответ или ошибку
            loader.remove();

            if (data.candidates && data.candidates[0]) {
                const aiText = data.candidates[0].content.parts[0].text;
                addBubble('ai', aiText);
            } else if (data.error) {
                // Выводим ошибку прямо в чат, чтобы понять, в чем дело
                addBubble('ai', "<b>Ошибка API:</b> " + data.error.message);
            } else {
                addBubble('ai', "<b>Странный ответ от сервера.</b> Попробуй еще раз.");
            }
        } catch (e) {
            loader.remove();
            addBubble('ai', "<b>Ошибка сети.</b> Скорее всего, нужно включить VPN.");
            console.error("Full error:", e);
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach((b) => hljs.highlightElement(b));
        } else {
            d.innerHTML = text;
        }
        
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') askGemini(); };
</script>

</body>
</html>
