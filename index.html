<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS v10.1 | Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #030305; --accent: #00f2ff; --text: #ffffff; --ai-b: #0d0d12; --user-b: #16161d; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 260px; background: #0a0a0e; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; }
        #scroller { flex: 1; overflow-y: auto; padding: 20px 10% 120px 10%; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 15px; margin-bottom: 15px; line-height: 1.5; }
        .user { background: var(--user-b); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: var(--ai-b); align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .input-area { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); }
        .box { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #444; border-radius: 15px; padding: 5px 15px; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .status { font-size: 12px; opacity: 0.5; margin-bottom: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color:var(--accent)">MOON AI 🌕</h2>
    <div class="status" id="st">Статус: Готов</div>
    <button style="background:#222; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">🗑 Очистить память</button>
</aside>

<main class="viewport">
    <div id="scroller"></div>
    <div class="input-area">
        <div class="box">
            <input type="text" id="inp" placeholder="Спроси Луну..." autocomplete="off">
            <button onclick="send()">▲</button>
        </div>
    </div>
</main>

<script>
    // Твой живой токен со скрина 228 (разрезали для GitHub)
    const key_1 = "hf_vZncEmlRvVfQKqdm";
    const key_2 = "FVnFqwPgHVPPVRLHCV";
    const AUTH = key_1 + key_2;

    // Используем Mistral (она лучше всего понимает русский)
    const MODEL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

    async function send() {
        const i = document.getElementById('inp');
        const s = document.getElementById('st');
        const text = i.value.trim();
        if(!text) return;

        addBubble('user', text);
        i.value = '';
        const loader = addBubble('ai', '<i>Луна принимает сигнал...</i>');
        s.innerText = "Статус: Отправка...";

        try {
            const response = await fetch(MODEL, {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + AUTH,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    inputs: `[INST] ${text} [/INST]`,
                    parameters: { max_new_tokens: 500, use_cache: false } 
                })
            });

            const data = await response.json();
            loader.remove();

            if (data.error) {
                if (data.estimated_time) {
                    addBubble('ai', `Луна еще спит. Проснется через ${Math.round(data.estimated_time)} сек. Попробуй еще раз чуть позже!`);
                    s.innerText = "Статус: Ожидание";
                } else {
                    addBubble('ai', "Ошибка: " + data.error);
                    s.innerText = "Статус: Ошибка";
                }
            } else if (data[0] && data[0].generated_text) {
                let reply = data[0].generated_text.split('[/INST]').pop().trim();
                addBubble('ai', reply);
                s.innerText = "Статус: Ответ получен";
            }
        } catch (e) {
            loader.innerHTML = "Ошибка связи. Проверь интернет или попробуй VPN.";
            s.innerText = "Статус: Сбой сети";
        }
    }

    function addBubble(role, content) {
        const sc = document.getElementById('scroller');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        d.innerHTML = (role === 'ai' && !content.includes('<i>')) ? marked.parse(content) : content;
        sc.appendChild(d);
        sc.scrollTop = sc.scrollHeight;
        return d;
    }

    document.getElementById('inp').onkeydown = e => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
