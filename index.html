<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI | Gemini Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #050508; --accent: #00f2ff; --panel: #0d0d12; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Модальное окно ключа */
        #key-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--panel); padding: 40px; border-radius: 25px; border: 1px solid var(--accent);
            text-align: center; max-width: 450px; width: 90%; box-shadow: 0 0 50px rgba(0,242,255,0.1);
        }

        /* Боковая панель */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-bottom: 5px; }
        .status-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Основная зона чата */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
        #chat { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 18px 22px; border-radius: 20px; line-height: 1.6; font-size: 16px; position: relative; }
        .user { background: #1e1e2e; align-self: flex-end; border-bottom-right-radius: 4px; color: var(--accent); border: 1px solid rgba(0,242,255,0.2); }
        .ai { background: #11111b; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 4px; }
        
        /* Поле ввода */
        .input-area { padding: 30px 10%; background: linear-gradient(transparent, var(--bg) 50%); display: flex; gap: 12px; }
        .input-wrapper { flex: 1; position: relative; background: #111; border: 1px solid #444; border-radius: 15px; display: flex; align-items: center; padding: 0 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px 5px; outline: none; font-size: 16px; }
        
        .btn-send { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: 900; color: #000; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Красивый скроллбар */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        pre { background: #000 !important; padding: 15px; border-radius: 12px; border: 1px solid #222; overflow-x: auto; margin: 10px 0; }
        code { font-family: 'Fira Code', monospace; font-size: 14px; }
    </style>
</head>
<body>

<div id="key-modal">
    <div class="modal-content">
        <h1 style="color:var(--accent); margin-bottom:10px;">MOON AI OS</h1>
        <p style="opacity:0.7; font-size: 14px;">Система требует API-ключ Gemini для активации нейронного модуля.</p>
        <input type="password" id="key-input" style="width:100%; margin: 20px 0; box-sizing: border-box;" placeholder="Вставь ключ AIzaSy...">
        <button onclick="saveKey()" style="width: 100%; height: 50px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ЗАПУСТИТЬ СИСТЕМУ</button>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent); font-size:12px; display:block; margin-top:20px; text-decoration: none; opacity: 0.6;">Получить ключ бесплатно (Google AI Studio)</a>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">MOON AI 🌕</div>
    <div style="font-size: 11px; margin-bottom: 30px;">
        <span id="dot" class="status-dot"></span>
        <span id="status-text" style="opacity:0.6;">OFFLINE</span>
    </div>
    
    <button onclick="clearChat()" style="background: #1a1a24; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: auto;">Очистить чат</button>
    <button onclick="changeKey()" style="background: transparent; color: #555; border: none; padding: 10px; cursor: pointer; font-size: 12px;">Сбросить ключ</button>
</aside>

<main class="main">
    <div id="chat"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msg-input" placeholder="Введите сообщение..." autocomplete="off">
        </div>
        <button class="btn-send" onclick="askGemini()">ОТПРАВИТЬ</button>
    </div>
</main>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let API_KEY = localStorage.getItem('gemini_token');
    let chatSession = null;

    if (API_KEY) {
        document.getElementById('key-modal').style.display = 'none';
        initGemini();
    }

    window.saveKey = function() {
        const val = document.getElementById('key-input').value.trim();
        if (val.length > 20) {
            localStorage.setItem('gemini_token', val);
            location.reload();
        } else {
            alert("Пожалуйста, введи корректный API ключ!");
        }
    }

    window.changeKey = function() {
        localStorage.removeItem('gemini_token');
        location.reload();
    }

    window.clearChat = function() {
        document.getElementById('chat').innerHTML = '';
        initGemini();
    }

    async function initGemini() {
        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            chatSession = model.startChat({
                history: [
                    { role: "user", parts: [{ text: "Привет! Ты — Луна, продвинутый ИИ-помощник Тимура. Общайся вежливо, помогай с программированием и отвечай на русском языке." }] },
                    { role: "model", parts: [{ text: "Принято. Я Луна. Система активирована и готова к работе." }] }
                ],
            });

            document.getElementById('dot').classList.add('status-online');
            document.getElementById('status-text').innerText = "ONLINE | GEMINI 1.5 FLASH";
        } catch (e) {
            console.error(e);
            document.getElementById('status-text').innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ";
        }
    }

    window.askGemini = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !chatSession) return;

        addBubble('user', text);
        input.value = '';
        const loader = addBubble('ai', '<i>Луна анализирует данные...</i>');

        try {
            const result = await chatSession.sendMessage(text);
            const response = await result.response;
            loader.remove();
            
            const rawText = response.text();
            addBubble('ai', rawText);
        } catch (e) {
            loader.innerHTML = "<span style='color:#ff5555'>Критическая ошибка! Проверь API-ключ или попробуй VPN (Gemini может быть ограничен в некоторых регионах).</span>";
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        } else {
            d.innerText = text.replace('<i>', '').replace('</i>', '');
            if(text.includes('<i>')) d.style.opacity = "0.5";
        }
        
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') window.askGemini(); };
</script>

</body>
</html>
