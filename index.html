<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI | Auto-System v13.0</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #050508; --accent: #00f2ff; --panel: #0d0d12; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #key-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; }
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.5; font-size: 16px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user { background: #1e1e2e; align-self: flex-end; color: var(--accent); border: 1px solid #333; }
        .ai { background: #11111b; align-self: flex-start; border: 1px solid #222; }
        .input-area { padding: 25px 10%; display: flex; gap: 10px; background: var(--bg); }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 14px; border-radius: 12px; outline: none; }
        button { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; color: #000; }
        pre { background: #000 !important; padding: 15px; border-radius: 12px; border: 1px solid #222; overflow-x: auto; }
    </style>
</head>
<body>

<div id="key-modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">MOON AI OS</h2>
        <input type="password" id="key-input" style="width:100%; margin: 20px 0; box-sizing: border-box;" placeholder="Вставь API-ключ">
        <button onclick="saveKey()" style="width: 100%; height: 45px;">ЗАПУСТИТЬ</button>
    </div>
</div>

<aside class="sidebar">
    <div style="font-size: 22px; font-weight: 900; color: var(--accent);">MOON AI 🌕</div>
    <div id="status" style="font-size: 10px; opacity: 0.5; margin-top: 10px;">READY</div>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top: auto; background: transparent; color: #444; border: 1px solid #222; padding: 5px; cursor: pointer; border-radius: 5px; font-size: 10px;">Сброс</button>
</aside>

<main class="main">
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Напиши Луне..." autocomplete="off">
        <button onclick="askGemini()">ОТПРАВИТЬ</button>
    </div>
</main>

<script type="module">
    let API_KEY = localStorage.getItem('gemini_token');
    
    // Список моделей для проверки (от новой к старой)
    const MODELS = [
        "gemini-1.5-flash-latest",
        "gemini-1.5-flash",
        "gemini-pro"
    ];

    if (API_KEY) { document.getElementById('key-modal').style.display = 'none'; }

    window.saveKey = function() {
        const val = document.getElementById('key-input').value.trim();
        if (val.startsWith('AIza')) { localStorage.setItem('gemini_token', val); location.reload(); }
    }

    window.askGemini = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        addBubble('user', text);
        input.value = '';
        const loader = addBubble('ai', '<i>Луна подбирает рабочую модель...</i>');

        let success = false;

        // ЦИКЛ ПРОВЕРКИ МОДЕЛЕЙ
        for (let modelName of MODELS) {
            try {
                // Пробуем запрос через v1beta (самая широкая поддержка моделей)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    loader.remove();
                    addBubble('ai', data.candidates[0].content.parts[0].text);
                    document.getElementById('status').innerText = "ONLINE | " + modelName.toUpperCase();
                    success = true;
                    break; // Сработало — выходим из цикла
                } else {
                    console.log(modelName + " не ответила: ", data.error?.message);
                }
            } catch (e) {
                console.log(modelName + " ошибка сети.");
            }
        }

        if (!success) {
            loader.innerHTML = "<span style='color:red'>Ни одна модель не ответила. Проверь VPN (Hiddify должен быть включен!) или статус ключа в Google AI Studio.</span>";
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else { d.innerHTML = text; }
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') askGemini(); };
</script>
</body>
</html>
