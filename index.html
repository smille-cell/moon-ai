<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI | Hugging Face 🌕</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --panel: #0d0d12; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Боковая панель */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
        .status { font-size: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 20px; }

        /* Основная зона чата */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { background: #1e1e2e; align-self: flex-end; color: var(--accent); border: 1px solid #333; border-bottom-right-radius: 4px; }
        .ai { background: #11111b; align-self: flex-start; border: 1px solid #222; border-bottom-left-radius: 4px; }
        
        /* Поле ввода */
        .input-area { padding: 25px 10%; display: flex; gap: 10px; background: var(--bg); border-top: 1px solid #111; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        button { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; color: #000; transition: 0.2s; }
        button:hover { transform: scale(1.03); opacity: 0.9; }

        /* Код и скролл */
        pre { background: #000 !important; padding: 15px; border-radius: 12px; border: 1px solid #222; overflow-x: auto; margin: 10px 0; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">MOON AI 🌕</div>
    <div class="status" id="status">Engine: Llama 3.1</div>
    <div style="margin-top: auto; font-size: 11px; color: #444; line-height: 1.4;">
        Используется прямой шлюз Hugging Face. <br>
        <span style="color: var(--accent)">VPN: REQUIRED</span>
    </div>
</aside>

<main class="main">
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Напиши Луне..." autocomplete="off">
        <button onclick="askAI()">ОТПРАВИТЬ</button>
    </div>
</main>

<script type="module">
    // --- НАСТРОЙКА КЛЮЧА ---
    const HF_TOKEN = "hf_ВАШ_НОВЫЙ_КЛЮЧ_СЮДА"; // <--- СТРОЧКА 75: ТВОЙ КЛЮЧ В КАВЫЧКАХ
    
    // Ссылка на модель Llama 3.1 (8 миллиардов параметров)
    const API_URL = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3.1-8B-Instruct";

    window.askAI = async function() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !HF_TOKEN) return;

        addBubble('user', text);
        input.value = '';
        const loader = addBubble('ai', '<i>Луна ловит сигнал...</i>');

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: text,
                    parameters: { 
                        max_new_tokens: 1000, 
                        return_full_text: false,
                        temperature: 0.7
                    }
                })
            });

            const data = await response.json();
            if (loader) loader.remove();

            // Проверка формата ответа (HF возвращает массив)
            if (Array.isArray(data) && data[0].generated_text) {
                addBubble('ai', data[0].generated_text);
            } else if (data.error) {
                addBubble('ai', "<b>Ошибка системы:</b> " + data.error);
                console.error(data.error);
            }
        } catch (e) {
            if (loader) loader.remove();
            addBubble('ai', "<b>Связь прервана.</b> Проверь VPN (Hiddify).");
        }
    }

    function addBubble(role, text) {
        const chat = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = 'bubble ' + role;
        
        if (role === 'ai' && !text.includes('<i>')) {
            d.innerHTML = marked.parse(text);
            d.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else {
            d.innerHTML = text;
        }
        
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
