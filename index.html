<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- ПЕРЕМЕННЫЕ И ТЕМЫ --- */
        :root {
            --bg: #0a0a0c;
            --sidebar-bg: #111114;
            --card-bg: #1a1a1e;
            --accent: #00aaff;
            --accent-glow: rgba(0, 170, 255, 0.3);
            --text: #e2e2e6;
            --text-dim: #a0a0a8;
            --user-msg: #282830;
            --ai-msg: #1a1a1e;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 20px;
        }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* --- БОКОВАЯ ПАНЕЛЬ --- */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            padding: 20px;
            z-index: 10;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            margin-right: -10px;
            padding-right: 10px;
        }

        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .chat-link {
            padding: 14px;
            border-radius: 14px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
            color: var(--text-dim);
        }

        .chat-link:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
        }

        .chat-link.active {
            background: rgba(0, 170, 255, 0.08);
            border-color: var(--accent);
            color: var(--accent);
        }

        .del-icon {
            opacity: 0;
            font-size: 18px;
            transition: 0.2s;
            padding: 0 5px;
        }

        .chat-link:hover .del-icon { opacity: 0.6; }
        .del-icon:hover { opacity: 1 !important; color: #ff4444; }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .status-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #1a3a2a;
            color: #44ff44;
            padding: 4px 10px;
            border-radius: 20px;
        }

        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 160px 15%;
            display: flex;
            flex-direction: column;
        }

        .msg-bubble {
            margin-bottom: 30px;
            padding: 20px 25px;
            border-radius: var(--radius);
            max-width: 85%;
            line-height: 1.7;
            font-size: 16px;
            animation: fadeIn 0.4s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .msg-ai {
            background: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* --- ПОЛЕ ВВОДА --- */
        .input-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(transparent, var(--bg) 50%);
        }

        .input-bar {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 28px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            transition: border-color 0.3s;
        }

        .input-bar:focus-within {
            border-color: var(--accent);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            resize: none;
            max-height: 150px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover { transform: scale(1.05); }

        /* Код */
        pre { background: #000 !important; padding: 15px; border-radius: 12px; border: 1px solid #222; margin: 15px 0; }
        code { font-family: 'Fira Code', monospace; color: #00ffcc; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Moon AI 🌕</div>
    <button class="btn-primary" onclick="startNewSession()">+ Новое окно</button>
    <div class="chat-history" id="chat-list"></div>
    
    <div style="padding-top:20px; border-top:1px solid var(--border)">
        <button onclick="exportChat()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px">💾 Скачать историю</button>
        <br><br>
        <button onclick="wipeAll()" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size:12px; opacity:0.6">🗑 Очистить память</button>
    </div>
</aside>

<main class="main-content">
    <header>
        <div id="header-title" style="font-weight: 600;">Готов к работе</div>
        <div class="status-tag">System Online</div>
    </header>

    <div id="chat-scroller"></div>

    <div class="input-footer">
        <div class="input-bar">
            <textarea id="main-input" rows="1" placeholder="Спроси о чем угодно (Shift+Enter для новой строки)..."></textarea>
            <button class="action-btn" onclick="processSend()">▲</button>
        </div>
    </div>
</main>

<script>
    // --- ЗАЩИЩЕННОЕ ЯДРО ---
    const _s = "sk-or-v1-";
    const _p1 = "076faa189179a0056a4e";
    const _p2 = "5b5c80825632e9fe77ec361cfd9839dfccce9d05b9b6";
    const ACCESS_KEY = _s + _p1 + _p2;

    const MODELS = [
        "meta-llama/llama-3-8b-instruct:free",
        "mistralai/mistral-7b-instruct:free",
        "microsoft/phi-3-mini-128k-instruct:free"
    ];

    let store = JSON.parse(localStorage.getItem('moon_ultra_v5')) || [];
    let activeId = localStorage.getItem('moon_ultra_active_id') || null;

    // --- ФУНКЦИИ УПРАВЛЕНИЯ ---
    function initApp() {
        refreshSidebar();
        if (activeId && store.find(c => c.id === activeId)) {
            switchChat(activeId);
        } else if (store.length > 0) {
            switchChat(store[0].id);
        } else {
            startNewSession();
        }
    }

    function startNewSession() {
        const id = 'session_' + Date.now();
        store.unshift({ id, title: "Новая беседа", logs: [] });
        sync();
        switchChat(id);
    }

    function switchChat(id) {
        activeId = id;
        localStorage.setItem('moon_ultra_active_id', id);
        const data = store.find(c => c.id === id);
        
        document.getElementById('header-title').innerText = data.title;
        const window = document.getElementById('chat-scroller');
        window.innerHTML = '';
        
        data.logs.forEach(log => renderMsg(log.role, log.content, false));
        refreshSidebar();
    }

    // --- ОТПРАВКА И API ---
    async function processSend() {
        const field = document.getElementById('main-input');
        const val = field.value.trim();
        if (!val) return;

        const session = store.find(c => c.id === activeId);
        if (session.logs.length === 0) session.title = val.substring(0, 30);

        session.logs.push({ role: 'user', content: val });
        renderMsg('user', val);
        field.value = '';
        sync();

        const loader = renderMsg('ai', '<i>Соединение с нейросетью...</i>');
        
        let success = false;
        // Авто-перебор моделей при ошибке
        for (let modelPath of MODELS) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${ACCESS_KEY}`
                    },
                    body: JSON.stringify({
                        "model": modelPath,
                        "messages": session.logs
                    })
                });

                const resData = await response.json();
                
                if (resData.choices && resData.choices[0]) {
                    loader.remove();
                    const aiResult = resData.choices[0].message.content;
                    session.logs.push({ role: 'assistant', content: aiResult });
                    renderMsg('ai', aiResult);
                    success = true;
                    break; 
                }
            } catch (err) {
                console.warn(`Модель ${modelPath} недоступна, пробую следующую...`);
            }
        }

        if (!success) {
            loader.innerHTML = "<span style='color:#ff4444'>Ошибка: Все каналы связи заняты. Попробуй через 30 секунд.</span>";
        }
        
        sync();
        refreshSidebar();
    }

    // --- ИНТЕРФЕЙСНЫЕ МЕТОДЫ ---
    function renderMsg(role, text, anim = true) {
        const box = document.getElementById('chat-scroller');
        const div = document.createElement('div');
        div.className = `msg-bubble msg-${role === 'user' ? 'user' : 'ai'}`;
        
        if (role === 'ai' && !text.includes('<i>')) {
            div.innerHTML = marked.parse(text);
        } else {
            div.innerHTML = text;
        }
        
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    function refreshSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        store.forEach(s => {
            const el = document.createElement('div');
            el.className = `chat-link ${s.id === activeId ? 'active' : ''}`;
            el.onclick = () => switchChat(s.id);
            el.innerHTML = `
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${s.title}</span>
                <span class="del-icon" onclick="deleteSession('${s.id}', event)">×</span>
            `;
            list.appendChild(el);
        });
    }

    function deleteSession(id, e) {
        e.stopPropagation();
        if(!confirm("Удалить?")) return;
        store = store.filter(s => s.id !== id);
        sync();
        initApp();
    }

    function exportChat() {
        const session = store.find(c => c.id === activeId);
        const text = session.logs.map(l => `${l.role}: ${l.content}`).join('\n\n');
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `moon-ai-chat-${Date.now()}.txt`;
        a.click();
    }

    function sync() { localStorage.setItem('moon_ultra_v5', JSON.stringify(store)); }
    function wipeAll() { if(confirm("Это удалит ВСЕ чаты навсегда!")) { localStorage.clear(); location.reload(); } }

    // Авто-высота поля ввода
    const input = document.getElementById('main-input');
    input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    input.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            processSend();
        }
    };

    initApp();
</script>

</body>
</html>
