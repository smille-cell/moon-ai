<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --side: #161616; --text: #ececec; --accent: #00aaff; --radius: 20px; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { width: 260px; background: var(--side); padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 15% 120px 15%; display: flex; flex-direction: column; }
        .msg { margin-bottom: 20px; padding: 15px 20px; border-radius: var(--radius); max-width: 85%; line-height: 1.6; border: 1px solid rgba(128,128,128,0.1); }
        .user { background: #2a2a2a; align-self: flex-end; }
        .ai { background: #1e1e1e; align-self: flex-start; }
        .input-area { position: absolute; bottom: 0; width: 100%; padding: 30px 0; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-wrap { max-width: 700px; margin: 0 auto; background: var(--side); border-radius: 25px; padding: 10px 20px; display: flex; border: 1px solid #444; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0">Moon AI 🌕</h2>
    <p style="font-size: 12px; opacity: 0.5;">v3.5 Fixed</p>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:#333; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">Очистить всё</button>
</div>

<div class="main">
    <div id="chat-window"></div>
    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="user-in" placeholder="Напиши Moon AI..." autocomplete="off">
            <button onclick="send()">▲</button>
        </div>
    </div>
</div>

<script>
    // СКЛЕЙКА КЛЮЧА БЕЗ ОШИБОК
    const k1 = "sk-or-v1-076faa189179a0056a4e5b5c80825632";
    const k2 = "e9fe77ec361cfd9839dfccce9d05b9b6";
    const FULL_KEY = k1 + k2;

    async function send() {
        const input = document.getElementById('user-in');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', text);
        input.value = '';

        const loadingMsg = addMessage('ai', 'Moon AI думает...');

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + FULL_KEY
                },
                body: JSON.stringify({
                    "model": "google/gemma-2-9b-it:free",
                    "messages": [{ "role": "user", "content": text }]
                })
            });

            const data = await response.json();
            loadingMsg.remove();

            if (data.choices && data.choices[0]) {
                addMessage('ai', data.choices[0].message.content);
            } else {
                addMessage('ai', "Ошибка: " + (data.error ? data.error.message : "что-то пошло не так"));
            }
        } catch (error) {
            loadingMsg.innerText = "Ошибка сети. Попробуй еще раз.";
        }
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerHTML = (role === 'ai') ? marked.parse(text) : text;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    document.getElementById('user-in').onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
