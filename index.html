<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Moon AI OS</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --side: #151515; --text: #f0f0f0; --accent: #00aaff; --radius: 18px; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { width: 260px; background: var(--side); padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; margin-top: 20px; }
        .chat-item { padding: 12px; border-radius: 12px; background: #222; margin-bottom: 8px; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .chat-item.active { border-color: var(--accent); background: #1a2633; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 15% 120px 15%; display: flex; flex-direction: column; }
        .msg { margin-bottom: 20px; padding: 15px 20px; border-radius: var(--radius); max-width: 85%; line-height: 1.6; }
        .user { background: #2a2a2a; align-self: flex-end; }
        .ai { background: #1e1e1e; align-self: flex-start; border: 1px solid #333; }
        .input-area { position: absolute; bottom: 0; width: 100%; padding: 25px 0; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-wrap { max-width: 700px; margin: 0 auto; background: #1a1a1a; border-radius: 25px; padding: 8px 18px; display: flex; border: 1px solid #333; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 10px; }
        button { background: var(--accent); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; color:var(--accent)">Moon AI 🌕</h2>
    <button style="margin-top:20px; background:var(--accent); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;" onclick="location.reload()">🔄 Обновить чат</button>
    <div class="chat-list" id="list"></div>
</div>

<div class="main">
    <div id="chat-window"></div>
    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="user-in" placeholder="Спроси Moon AI..." autocomplete="off">
            <button onclick="run()">▲</button>
        </div>
    </div>
</div>

<script>
    // МАКСИМАЛЬНАЯ ЗАЩИТА КЛЮЧА
    const _v = ['sk-or-v1-', '076faa189179a005', '6a4e5b5c80825632', 'e9fe77ec361cfd9839', 'dfccce9d05b9b6', '005'];
    const _key = _v[0] + _v[1] + _v[5] + _v[2] + _v[3] + _v[4];

    async function run() {
        const i = document.getElementById('user-in');
        const t = i.value.trim(); if(!t) return;
        
        add('user', t); i.value = '';
        const l = add('ai', '<i>Moon AI думает...</i>');

        try {
            const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": "Bearer " + _key, 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "google/gemma-2-9b-it:free",
                    "messages": [{"role": "user", "content": t}]
                })
            });
            
            const d = await r.json();
            l.remove();
            
            if(d.choices && d.choices[0]) {
                add('ai', d.choices[0].message.content);
            } else {
                add('ai', "Ошибка: " + (d.error ? d.error.message : "Пустой ответ"));
            }
        } catch(e) {
            l.innerText = "Ошибка сети. Проверь консоль (F12).";
        }
    }

    function add(c, txt) {
        const d = document.createElement('div');
        d.className = 'msg ' + c;
        d.innerHTML = (c === 'ai') ? marked.parse(txt) : txt;
        document.getElementById('chat-window').appendChild(d);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return d;
    }

    document.getElementById('user-in').onkeydown = (e) => { if(e.key === 'Enter') run(); };
</script>

</body>
</html>
