<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon AI OS v9.5 | Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #050508;
            --panel: #0d0d12;
            --accent: #00f2ff;
            --user-b: #1a1a24;
            --ai-b: #0f0f14;
            --text: #ffffff;
            --border: rgba(0, 242, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }
        body {
            margin: 0; display: flex; height: 100vh;
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px; background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px;
        }

        .logo {
            font-size: 24px; font-weight: 900; color: var(--accent);
            margin-bottom: 30px; letter-spacing: 1px;
        }

        .new-btn {
            background: var(--accent); color: #000; border: none;
            padding: 15px; border-radius: 12px; font-weight: 800;
            cursor: pointer; margin-bottom: 25px;
        }

        .history { flex: 1; overflow-y: auto; }
        .history-item {
            padding: 12px; background: rgba(255,255,255,0.03);
            border-radius: 10px; margin-bottom: 8px; cursor: pointer;
            display: flex; justify-content: space-between; font-size: 14px;
        }
        .history-item.active { border: 1px solid var(--accent); background: rgba(0,242,255,0.05); }

        /* --- MAIN --- */
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; }
        .nav { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; }

        #scroller {
            flex: 1; overflow-y: auto;
            padding: 40px 15% 180px 15%;
            display: flex; flex-direction: column;
        }

        .bubble {
            max-width: 85%; padding: 20px 25px; border-radius: 20px;
            margin-bottom: 25px; line-height: 1.7; font-size: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .user { background: var(--user-b); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: var(--ai-b); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* --- INPUT --- */
        .input-area {
            position: absolute; bottom: 0; width: 100%;
            padding: 40px; background: linear-gradient(transparent, var(--bg) 70%);
        }

        .input-box {
            max-width: 800px; margin: 0 auto; background: #15151b;
            border: 1px solid #333; border-radius: 25px;
            padding: 10px 20px; display: flex; align-items: center;
        }

        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        pre { background: #000 !important; padding: 20px; border-radius: 12px; border: 1px solid #222; overflow-x: auto; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">MOON AI 🌕</div>
    <button class="new-btn" onclick="startNew()">+ Новая сессия</button>
    <div class="history" id="history-list"></div>
</aside>

<main class="viewport">
    <div class="nav"><b id="title">Система активна</b></div>
    <div id="scroller"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-in" placeholder="Спроси Луну..." autocomplete="off">
            <button class="send-btn" onclick="askAI()">▲</button>
        </div>
    </div>
</main>

<script>
    // СКЛЕИВАЕМ ТОКЕН (Обход защиты GitHub)
    const p1 = "hf_vZncEmlRvVfQKqdm";
    const p2 = "FVnFqwPgHVPPVRLHCV";
    const KEY = p1 + p2;

    // СТАБИЛЬНАЯ МОДЕЛЬ
    const URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

    let chats = JSON.parse(localStorage.getItem('moon_v95')) || [];
    let currentId = localStorage.getItem('moon_active_v95') || null;

    function init() {
        renderHistory();
        if (currentId && chats.find(c => c.id == currentId)) {
            loadChat(currentId);
        } else if (chats.length > 0) {
            loadChat(chats[0].id);
        } else {
            startNew();
        }
    }

    function startNew() {
        const id = Date.now();
        chats.unshift({ id, title: "Новый чат", logs: [] });
        save();
        loadChat(id);
    }

    function loadChat(id) {
        currentId = id;
        localStorage.setItem('moon_active_v95', id);
        const chat = chats.find(c => c.id == id);
        document.getElementById('title').innerText = chat.title;
        document.getElementById('scroller').innerHTML = '';
        chat.logs.forEach(m => pushBubble(m.role, m.content, false));
        renderHistory();
    }

    async function askAI() {
        const field = document.getElementById('user-in');
        const text = field.value.trim();
        if (!text) return;

        const chat = chats.find(c => c.id == currentId);
        if (chat.logs.length === 0) chat.title = text.substring(0, 25);

        chat.logs.push({ role: 'user', content: text });
        pushBubble('user', text);
        field.value = '';
        save();

        const loader = pushBubble('ai', '<i>Луна на связи...</i>');

        try {
            const res = await fetch(URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `[INST] ${text} [/INST]`,
                    parameters: { max_new_tokens: 500 }
                })
            });

            if (!res.ok) throw new Error('Ошибка API: ' + res.status);

            const data = await res.json();
            loader.remove();

            let reply = (data[0] && data[0].generated_text) 
                ? data[0].generated_text.split('[/INST]').pop().trim() 
                : "Не удалось получить ответ.";

            chat.logs.push({ role: 'assistant', content: reply });
            pushBubble('ai', reply);
        } catch (e) {
            loader.innerHTML = `<span style="color:#ff5555">Ошибка: ${e.message}. Проверь токен на Hugging Face (он должен быть зеленым).</span>`;
        }
        save();
        renderHistory();
    }

    function pushBubble(role, content, scroll = true) {
        const box = document.getElementById('scroller');
        const div = document.createElement('div');
        div.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
        
        if (role === 'ai' && !content.includes('<i>') && !content.includes('color')) {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        } else {
            div.innerHTML = content;
        }
        
        box.appendChild(div);
        if (scroll) box.scrollTop = box.scrollHeight;
        return div;
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const d = document.createElement('div');
            d.className = `history-item ${c.id == currentId ? 'active' : ''}`;
            d.onclick = () => loadChat(c.id);
            d.innerHTML = `<span>${c.title}</span><span onclick="delChat(${c.id}, event)">×</span>`;
            list.appendChild(d);
        });
    }

    function delChat(id, e) {
        e.stopPropagation();
        chats = chats.filter(c => c.id != id);
        save();
        init();
    }

    function save() { localStorage.setItem('moon_v95', JSON.stringify(chats)); }
    document.getElementById('user-in').onkeydown = e => { if(e.key === 'Enter') askAI(); };
    init();
</script>
</body>
</html>
